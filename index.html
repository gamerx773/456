<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MATRIX EVOLUTION v17.6</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=JetBrains+Mono&display=swap');
        :root { --neon: #00f2ff; --pink: #ff007a; --gold: #f1c40f; --bg: #000; --glass: rgba(15, 15, 30, 0.95); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: var(--bg); color: white; font-family: 'JetBrains Mono', monospace; }
        
        .screen { position: fixed; inset: 0; z-index: 100; display: none; flex-direction: column; padding: 110px 20px 20px; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); overflow-y: auto; }
        .panel { background: var(--glass); border: 1px solid rgba(0, 242, 255, 0.2); border-radius: 15px; padding: 20px; margin-bottom: 15px; max-width: 500px; margin-left: auto; margin-right: auto; }
        #hud { position: fixed; top: 0; left: 0; right: 0; z-index: 2000; padding: 15px; background: rgba(0,0,0,0.85); border-bottom: 1px solid var(--neon); display: none; }
        
        #q-text { font-size: 3.5rem; color: var(--neon); text-align: center; font-family: 'Orbitron'; margin: 20px 0; }
        .opt-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .opt-btn { padding: 25px 10px; font-size: 1.8rem; background: rgba(0,242,255,0.05); border: 2px solid var(--neon); color: white; border-radius: 15px; font-family: 'Orbitron'; cursor: pointer; }
        
        .action-btn { width: 100%; padding: 15px; border-radius: 10px; border: none; background: var(--pink); color: white; font-family: 'Orbitron'; font-weight: 900; cursor: pointer; margin-top: 10px; }
        .input-field { width: 100%; padding: 12px; margin: 10px 0; background: #111; border: 1px solid #333; color: white; border-radius: 8px; text-align: center; font-family: 'Orbitron'; }
        
        .leader-row { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid rgba(0, 242, 255, 0.1); font-size: 0.9rem; font-family: 'Orbitron'; }
        .grade-pill { padding: 8px; border: 1px solid #444; border-radius: 8px; font-size: 0.7rem; text-align: center; cursor: pointer; }
        .grade-pill.active { border-color: var(--neon); color: var(--neon); background: rgba(0,242,255,0.1); }
    </style>
</head>
<body>

    <div id="hud">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <div id="menu-btn" onclick="App.toggleKing()" style="font-size:1.8rem; cursor:pointer; color:var(--neon);">☰</div>
            <div style="font-family:'Orbitron'; display:flex; gap:20px;">
                <span style="color:var(--gold);">💎 <span id="stat-gems">0</span></span>
                <span style="color:var(--pink);">RB: <span id="stat-rb">0</span></span>
            </div>
        </div>
    </div>

    <div id="screen-auth" class="screen" style="display:flex; justify-content:center; align-items:center;">
        <div class="panel" style="width:100%; text-align:center;">
            <h1 style="font-family:'Orbitron'; color:var(--neon);">MATRIX v17.6</h1>
            <input type="text" id="login-u" class="input-field" placeholder="USER ID">
            <input type="password" id="login-p" class="input-field" placeholder="PASSCODE">
            <button class="action-btn" onclick="Auth.login()">INITIALIZE</button>
        </div>
    </div>

    <div id="screen-game" class="screen">
        <div class="panel" style="border-color: var(--gold);">
            <div style="color:var(--gold); font-family:'Orbitron'; text-align:center; margin-bottom:10px;">TOP OPERATORS</div>
            <div id="leaderboard-list"></div>
        </div>

        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px; margin-bottom:20px;">
            <div id="g-3" class="grade-pill active" onclick="App.setGrade(3)">GRADE 3</div>
            <div id="g-6" class="grade-pill" onclick="App.setGrade(6)">GRADE 6</div>
        </div>
        <div id="q-text">...</div>
        <div id="options" class="opt-grid"></div>
        <button class="action-btn" style="margin-top:30px; background:var(--gold); color:black;" onclick="App.attemptRebirth()">REBIRTH (10k GEMS)</button>
    </div>

    <div id="screen-king" class="screen">
        <h2 style="color:var(--gold); text-align:center; font-family:'Orbitron';">KING OVERRIDE</h2>
        
        <div class="panel" style="border-color: var(--gold);">
            <h4 style="color:var(--gold); margin-top:0;">SYSTEM OVERRIDE</h4>
            <input type="text" id="k-target-user" class="input-field" placeholder="PLAYER ID">
            
            <div style="border-top: 1px solid #333; margin-top: 10px; padding-top: 10px;">
                <label style="font-size: 0.6rem; color: var(--gold);">IDENTITY COLOR</label>
                <select id="k-color-select" class="input-field" style="background: #222; border: 1px solid var(--gold); color: white;"></select>
                <button class="action-btn" style="background: var(--gold); color: black;" onclick="App.kingSetColor()">FORCE COLOR</button>
            </div>

            <div style="border-top: 1px solid #333; margin-top: 10px; padding-top: 10px;">
                <label style="font-size: 0.6rem; color: var(--pink);">REBIRTH LEVEL</label>
                <input type="number" id="k-rb-val" class="input-field" placeholder="NEW RB NUMBER">
                <button class="action-btn" style="background: var(--pink); color: white;" onclick="App.kingSetRebirth()">FORCE REBIRTH</button>
            </div>
        </div>

        <div class="panel">
            <h4>GIFT GEMS</h4>
            <input type="text" id="k-user" class="input-field" placeholder="USER ID">
            <input type="number" id="k-amt" class="input-field" placeholder="AMOUNT">
            <button class="action-btn" onclick="App.kingGift()">SEND GEMS</button>
        </div>
        <button class="action-btn" style="background:#444;" onclick="App.toggleKing()">CLOSE TERMINAL</button>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://nexus-firebase-900d4-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const DB = firebase.database();

        const App = {
            user: null, gems: 0, rb: 0, grade: 3,
            init(data) {
                this.user = data.name;
                this.setupSync();
                this.setupLeaderboard();
                this.generateColors();
                this.setGrade(3);
                document.getElementById('hud').style.display = 'block';
                document.getElementById('screen-game').style.display = 'flex';
                if(this.user === 'KING') document.getElementById('menu-btn').innerText = "👑";
            },
            setupSync() {
                DB.ref('users/'+this.user).on('value', s => {
                    const d = s.val(); if(!d) return;
                    this.gems = d.gems || 0;
                    this.rb = d.rebirth || 0;
                    document.getElementById('stat-gems').innerText = Math.floor(this.gems).toLocaleString();
                    document.getElementById('stat-rb').innerText = this.rb;
                    if(d.color) document.documentElement.style.setProperty('--neon', d.color);
                });
            },
            setupLeaderboard() {
                DB.ref('users').orderByChild('gems').limitToLast(5).on('value', snap => {
                    const list = document.getElementById('leaderboard-list');
                    list.innerHTML = "";
                    let players = [];
                    snap.forEach(c => players.push(c.val()));
                    players.reverse().forEach(p => {
                        list.innerHTML += `
                            <div class="leader-row">
                                <span style="color:${p.color || '#00f2ff'}">${p.name}</span>
                                <span style="color:var(--gold)">${Math.floor(p.gems).toLocaleString()}</span>
                            </div>`;
                    });
                });
            },
            generateColors() {
                const sel = document.getElementById('k-color-select');
                for(let i=0; i<360; i+=8) {
                    let hex = `hsl(${i}, 100%, 60%)`;
                    let opt = document.createElement('option');
                    opt.value = hex;
                    opt.innerText = `SPECTRUM V-${i}`;
                    opt.style.color = hex;
                    sel.appendChild(opt);
                }
            },
            kingSetColor() {
                const target = document.getElementById('k-target-user').value.toUpperCase().trim();
                const color = document.getElementById('k-color-select').value;
                if(target) {
                    DB.ref('users/' + target).update({ color: color })
                    .then(() => alert("COLOR OVERRIDE SUCCESS: " + target));
                }
            },
            kingSetRebirth() {
                const target = document.getElementById('k-target-user').value.toUpperCase().trim();
                const val = parseInt(document.getElementById('k-rb-val').value);
                if(target && !isNaN(val)) {
                    DB.ref('users/' + target).update({ rebirth: val })
                    .then(() => alert("REBIRTH OVERRIDE SUCCESS: " + target + " is now RB " + val));
                } else {
                    alert("ENTER VALID USER ID AND NUMBER");
                }
            },
            setGrade(g) {
                this.grade = g;
                document.querySelectorAll('.grade-pill').forEach(p => p.classList.remove('active'));
                document.getElementById('g-'+g).classList.add('active');
                this.nextQ();
            },
            nextQ() {
                let a, b, ans;
                if(this.grade === 3) { a = Math.floor(Math.random()*10); b = Math.floor(Math.random()*10); ans = a + b; }
                else { a = Math.floor(Math.random()*12); b = Math.floor(Math.random()*12); ans = a * b; }
                
                document.getElementById('q-text').innerText = this.grade === 3 ? `${a} + ${b}` : `${a} × ${b}`;
                const opts = [ans, ans+2, ans-1, ans+5].sort(()=>Math.random()-.5);
                const container = document.getElementById('options'); container.innerHTML = "";
                opts.forEach(o => {
                    const btn = document.createElement('button'); btn.className = 'opt-btn'; btn.innerText = o;
                    btn.onclick = () => {
                        if(o === ans) {
                            let reward = (this.grade === 3 ? 50 : 150) * (1 + this.rb);
                            this.gems += reward;
                            confetti({ particleCount: 30, spread: 60, origin: { y: 0.8 } });
                            DB.ref('users/'+this.user).update({gems: this.gems});
                        }
                        this.nextQ();
                    };
                    container.appendChild(btn);
                });
            },
            attemptRebirth() {
                if(this.gems >= 10000) {
                    this.gems = 0; this.rb += 1;
                    DB.ref('users/'+this.user).update({gems: 0, rebirth: this.rb});
                    alert("REBIRTH COMPLETE!");
                } else { alert("NOT ENOUGH GEMS (10,000 REQUIRED)"); }
            },
            toggleKing() {
                if(this.user !== 'KING') return;
                const s = document.getElementById('screen-king');
                s.style.display = (s.style.display === 'flex') ? 'none' : 'flex';
            },
            kingGift() {
                const u = document.getElementById('k-user').value.toUpperCase().trim();
                const a = parseInt(document.getElementById('k-amt').value);
                if(u && a) {
                    DB.ref('users/'+u+'/gems').transaction(g => (g||0)+a)
                    .then(() => alert("GEMS SENT TO " + u));
                }
            }
        };

        const Auth = {
            async login() {
                const u = document.getElementById('login-u').value.toUpperCase().trim();
                const p = document.getElementById('login-p').value;
                if(!u || !p) return;
                const snap = await DB.ref('users/'+u).once('value');
                let d = snap.val();
                if(!d) { d = {name:u, pass:p, gems:0, rebirth:0}; await DB.ref('users/'+u).set(d); }
                if(d.pass === p) { document.getElementById('screen-auth').style.display='none'; App.init(d); }
                else { alert("INVALID PASSCODE"); }
            }
        };
    </script>
</body>
</html>
